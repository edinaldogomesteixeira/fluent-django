<div
    class="video-modal"
    id="videoModal"
>

    <div class="modal-content">

        <button
            class="close-modal"
            id="closeModal"
        >
            ✕
        </button>

        <!-- HTML5 PLAYER -->

        <video
            class="modal-video"
            id="modalVideo"
            controls
            autoplay
            playsinline
            preload="metadata"
        ></video>

        <!-- YOUTUBE PLAYER -->

        <div
            id="youtubePlayer"
            class="youtube-player"
        ></div>

        <!-- VIDEO INFO -->

        <div class="modal-info">

            <h2 id="modalTitle">
                Video Title
            </h2>

            <p id="modalDetails">
                Intermediate • 10 Words
            </p>

        </div>

        <!-- TRANSCRIPT -->

        <div
            class="transcript"
            id="transcript"
        ></div>
     
    </div>

</div>
