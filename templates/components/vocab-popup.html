<div
    id="vocabPopup"
    class="vocab-popup"
>

    <div class="vocab-popup-card">

        <button
            class="popup-close"
            id="closeVocabularyPopup"
        >
            ✕
        </button>

        <h2
            id="popupWord"
            class="popup-word"
        >
        </h2>

        <div
            id="popupIPA"
            class="popup-ipa"
        >
        </div>

        <div
            id="popupTranslation"
            class="popup-translation"
        >
        </div>

        <div
            id="popupDefinition"
            class="popup-definition"
        >
        </div>

        <div class="knowledge-levels">

            <button
                class="knowledge-button delete"
                data-level="0"
            >
                <i class="fa-regular fa-trash-can"></i>
            </button>

            <button
                class="knowledge-button"
                data-level="1"
            >
                1
            </button>

            <button
                class="knowledge-button"
                data-level="2"
            >
                2
            </button>

            <button
                class="knowledge-button"
                data-level="3"
            >
                3
            </button>

            <button
                class="knowledge-button"
                data-level="4"
            >
                4
            </button>

            <button
                class="knowledge-button success"
                data-level="5"
            >
                ✓
            </button>

        </div>

    </div>

</div>
